<div class="modal-overlay hidden" id="resumeModal">
  <div class="modal-dialog">
    <h3>Продолжить?</h3>
    <p id="resumeModalText"></p>
    <div class="modal-actions">
      <button class="modal-btn" data-action="confirmResume">Продолжить</button>
      <button class="modal-btn modal-btn-exit" data-action="confirmRestart">Начать заново</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="exitModal">
  <div class="modal-dialog">
    <h3>Хотите выйти?</h3>
    <p>Можно продолжить потом</p>
    <div class="modal-actions">
      <button class="modal-btn" data-action="closeExitModal">Продолжить</button>
      <button class="modal-btn modal-btn-exit" data-action="confirmExit">Выйти</button>
    </div>
  </div>
</div>
