<div id="marathonScreen" class="screen hidden">
  <header class="screen-header">
    <button class="back-btn" data-action="showHome">&#8592;</button>
    <h2>Марафон</h2>
  </header>
  <div class="marathon-content">
    <div class="marathon-image">
      <img src="/assets/dashatars.png" alt="Flutter Birds">
    </div>
    <h2 class="marathon-heading">Все <span id="marathonTotal">117</span> вопросов</h2>
    <p class="marathon-sub">Проверь себя на прочность!</p>
    <button class="btn btn-primary marathon-start" data-action="startMarathon">Начать марафон</button>
    <p class="marathon-note">Вы всегда можете остановиться и продолжить позже</p>
  </div>
</div>
