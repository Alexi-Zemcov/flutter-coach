<div id="resultsScreen" class="screen hidden">
  <h1 class="results-title">Результаты</h1>

  <div class="score-circle" id="scoreCircle">
    <div class="score-number" id="scoreNumber"></div>
    <div class="score-label" id="scoreLabel"></div>
  </div>

  <div class="category-results" id="categoryResults"></div>

  <div class="results-actions">
    <button class="btn btn-primary" data-action="retryCurrentMode">Пройти заново</button>
    <button class="btn btn-secondary" data-action="showHome">На главную</button>
  </div>
</div>
